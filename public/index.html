<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promoção Dia das Mães | Buffet Biruta Park</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="campaign-body">
  <div class="floating-scene" aria-hidden="true">
    <div class="float-item heart h1"></div>
    <div class="float-item logo l1"></div>
    <div class="float-item heart h2"></div>
    <div class="float-item logo l2"></div>
    <div class="float-item heart h3"></div>
    <div class="float-item heart h4"></div>
    <div class="float-item logo l3"></div>
    <div class="float-item heart h5"></div>
    <div class="float-item logo l4"></div>
    <div class="float-item heart h6"></div>
    <div class="float-item logo l5"></div>
    <div class="float-item heart h7"></div>
    <div class="float-item heart h8"></div>
    <div class="float-item logo l6"></div>
  </div>

  <main class="campaign-shell">
    <section class="hero-card glass-card">
      <div class="hero-media" id="heroMedia">
        <img src="/assets/cadastro-banner.jpg" alt="Campanha Dia das Mães Buffet Biruta Park" class="hero-image" id="heroImage" />
        <div class="hero-fallback" id="heroFallback">
          <img src="/assets/logo-biruta.png" alt="Logo Buffet Biruta Park" class="hero-fallback-logo" />
          <div class="hero-fallback-copy">
            <span class="hero-kicker">campanha especial</span>
            <h1>Dia das Mães no Biruta Park</h1>
            <p>Descubra seu perfil, conquiste sua cortesia e viva um momento inesquecível.</p>
          </div>
        </div>
      </div>

      <div class="brand-row">
        <div class="brand-chip">Buffet Biruta Park</div>
        <div class="brand-chip soft">Promoção Dia das Mães</div>
      </div>
      <div id="app"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/app.js" defer></script>
</body>
</html>
